name: Daily Liturgical Office

on:
  schedule:
    # 5:01 UTC = 12:01 AM Eastern (EST). Adjust to 4:01 UTC during EDT (summer).
    - cron: '1 5 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab for testing

jobs:
  generate-today:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate today.md (1928 edition)
        run: |
          python _engine/computus.py > today.md
          echo "" >> today.md
          echo "---" >> today.md
          echo "*Generated by the Concordentary Computus Engine — $(date -u '+%Y-%m-%dT%H:%M:%SZ')*" >> today.md
          echo "*Source: BCP 1928, TABLE I and TABLE II — repo.thestrategicdisciple.com*" >> today.md

      - name: Commit and push
        run: |
          git config user.name "Concordentary Bot"
          git config user.email "thestrategicdisciple@gmail.com"
          git add today.md
          git diff --staged --quiet || git commit -m "Daily office: $(date -u '+%Y-%m-%d')"
          git push
